name: PR Labeler

on: pull_request

jobs:
  labelPR:
    name: Label PR With Repo(s)
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: TimonVS/pr-labeler-action@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/pr-labeler.yml
